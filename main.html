<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Face Analysis</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --glass-bg: rgba(255,255,255,0.08);
  --glass-border: rgba(255,255,255,0.18);
  --glass-highlight: rgba(255,255,255,0.28);
  --glass-shadow: rgba(0,0,0,0.25);
  --blur: blur(24px) saturate(160%);
  --text: rgba(255,255,255,0.92);
  --text-2: rgba(255,255,255,0.52);
  --text-3: rgba(255,255,255,0.28);
  --accent: rgba(255,255,255,0.9);
  --r: 20px;
}

html, body {
  height: 100%;
  font-family: 'DM Sans', sans-serif;
  font-weight: 300;
  background: #0d0d14;
  color: var(--text);
  overflow: hidden;
}

/* Ambient background */
.bg {
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 10%, rgba(100,140,255,0.18) 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 80% 90%, rgba(180,100,255,0.14) 0%, transparent 55%),
    radial-gradient(ellipse 50% 50% at 50% 50%, rgba(255,255,255,0.02) 0%, transparent 70%),
    linear-gradient(160deg, #0d0f1e 0%, #0a0a12 50%, #130d1a 100%);
}

/* Grain overlay */
.bg::after {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  opacity: 0.5;
}

/* ── Layout ── */
.shell {
  position: relative; z-index: 1;
  display: grid;
  grid-template-rows: 56px 1fr;
  height: 100vh;
  padding: 16px;
  gap: 12px;
}

/* ── Header ── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: 14px;
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
  position: relative;
  overflow: hidden;
}

header::before {
  content: '';
  position: absolute;
  top: 0; left: 10%; right: 10%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--glass-highlight), transparent);
}

.wordmark {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.12em;
  color: var(--text);
  opacity: 0.9;
}

.wordmark span {
  opacity: 0.4;
  font-weight: 400;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--text-2);
  letter-spacing: 0.06em;
}

.dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: rgba(100,210,160,0.8);
  box-shadow: 0 0 8px rgba(100,210,160,0.6);
  animation: breathe 3s ease-in-out infinite;
}

@keyframes breathe {
  0%,100% { opacity:1; }
  50% { opacity:0.4; }
}

/* ── Main grid ── */
.content {
  display: grid;
  grid-template-columns: 1fr 340px;
  gap: 12px;
  overflow: hidden;
}

/* ── Glass card base ── */
.glass {
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: var(--r);
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
  position: relative;
  overflow: hidden;
}

.glass::before {
  content: '';
  position: absolute;
  top: 0; left: 8%; right: 8%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--glass-highlight), transparent);
  pointer-events: none;
  z-index: 1;
}

/* ── Upload / Preview ── */
.upload-zone {
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  cursor: pointer;
  transition: background 0.25s;
  border-radius: var(--r);
}

.upload-zone:hover { background: rgba(255,255,255,0.04); }

.upload-icon {
  width: 56px; height: 56px;
  border-radius: 16px;
  border: 1px solid var(--glass-border);
  background: rgba(255,255,255,0.06);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  transition: transform 0.2s;
}

.upload-zone:hover .upload-icon { transform: scale(1.05); }

.upload-label {
  font-size: 14px;
  color: var(--text-2);
  letter-spacing: 0.02em;
  text-align: center;
  line-height: 1.6;
}

.upload-sub {
  font-size: 11px;
  color: var(--text-3);
  font-family: 'DM Mono', monospace;
}

#file-input { display: none; }

/* Image preview */
.img-wrap {
  width: 100%; height: 100%;
  position: relative;
  border-radius: var(--r);
  overflow: hidden;
  display: none;
}

.img-wrap img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}

/* Scan overlay */
.scan-overlay {
  position: absolute; inset: 0;
  background: rgba(10,10,20,0.5);
  backdrop-filter: blur(2px);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 18px;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}

.scan-overlay.show { opacity: 1; pointer-events: all; }

.scan-ring {
  width: 64px; height: 64px;
  border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,0.15);
  border-top-color: rgba(255,255,255,0.7);
  animation: spin 1s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.scan-text {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.14em;
  color: var(--text-2);
}

/* Scan line */
.scan-line {
  position: absolute; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.5) 50%, transparent 100%);
  animation: scanMove 2.4s ease-in-out infinite;
  pointer-events: none;
}

@keyframes scanMove {
  0% { top: 0; opacity: 0; }
  5% { opacity: 1; }
  95% { opacity: 1; }
  100% { top: 100%; opacity: 0; }
}

/* Image overlay info */
.img-meta {
  position: absolute;
  bottom: 14px; left: 14px; right: 14px;
  display: flex; align-items: center; justify-content: space-between;
  z-index: 3;
}

.img-badge {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--text-2);
  background: rgba(0,0,0,0.4);
  border: 1px solid rgba(255,255,255,0.1);
  padding: 5px 10px;
  border-radius: 8px;
  backdrop-filter: blur(12px);
}

.reupload-btn {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.08em;
  color: var(--text-2);
  background: rgba(0,0,0,0.4);
  border: 1px solid rgba(255,255,255,0.12);
  padding: 5px 12px;
  border-radius: 8px;
  cursor: pointer;
  backdrop-filter: blur(12px);
  transition: all 0.2s;
}

.reupload-btn:hover {
  color: var(--text);
  border-color: rgba(255,255,255,0.25);
  background: rgba(0,0,0,0.55);
}

/* ── Analyze button ── */
.analyze-btn {
  position: absolute;
  bottom: 14px; left: 50%; transform: translateX(-50%);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 400;
  letter-spacing: 0.04em;
  color: rgba(255,255,255,0.88);
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.22);
  padding: 10px 28px;
  border-radius: 12px;
  cursor: pointer;
  backdrop-filter: blur(20px);
  transition: all 0.22s;
  white-space: nowrap;
  z-index: 4;
  display: none;
}

.analyze-btn::before {
  content: '';
  position: absolute; top: 0; left: 10%; right: 10%;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
}

.analyze-btn:hover {
  background: rgba(255,255,255,0.16);
  border-color: rgba(255,255,255,0.32);
  transform: translateX(-50%) translateY(-1px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}

.analyze-btn:active { transform: translateX(-50%) translateY(0); }

/* ── Results panel ── */
.results-col {
  display: flex; flex-direction: column; gap: 10px;
  overflow-y: auto;
  padding-right: 2px;
}

.results-col::-webkit-scrollbar { width: 3px; }
.results-col::-webkit-scrollbar-track { background: transparent; }
.results-col::-webkit-scrollbar-thumb {
  background: rgba(255,255,255,0.12);
  border-radius: 2px;
}

/* Empty placeholder */
.empty-state {
  height: 100%;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 10px;
  padding: 32px 20px;
  text-align: center;
}

.empty-icon {
  font-size: 28px;
  opacity: 0.2;
  margin-bottom: 4px;
}

.empty-title {
  font-size: 14px;
  color: var(--text-2);
  font-weight: 400;
}

.empty-sub {
  font-size: 12px;
  color: var(--text-3);
  line-height: 1.6;
  font-family: 'DM Mono', monospace;
}

/* ── Cards ── */
.card {
  padding: 18px 18px 16px;
  flex-shrink: 0;
}

.card-header {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-3);
  margin-bottom: 14px;
}

/* Score card */
.score-main {
  display: flex;
  align-items: baseline;
  gap: 6px;
  margin-bottom: 10px;
}

.score-num {
  font-size: 52px;
  font-weight: 300;
  line-height: 1;
  color: var(--text);
  letter-spacing: -0.02em;
  transition: all 0.6s;
}

.score-denom {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  color: var(--text-3);
}

.score-label {
  margin-left: auto;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.1em;
  color: var(--text-2);
  align-self: center;
  padding-bottom: 4px;
}

.score-track {
  height: 2px;
  background: rgba(255,255,255,0.06);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 6px;
}

.score-fill {
  height: 100%;
  background: rgba(255,255,255,0.55);
  border-radius: 2px;
  width: 0%;
  transition: width 1s cubic-bezier(0.4,0,0.2,1);
}

.score-desc {
  font-size: 11px;
  color: var(--text-3);
  font-family: 'DM Mono', monospace;
  line-height: 1.5;
}

/* Metric rows */
.metric {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 7px 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

.metric:last-child { border-bottom: none; }

.m-name {
  font-size: 12px;
  color: var(--text-2);
  min-width: 90px;
  font-weight: 300;
}

.m-track {
  flex: 1;
  height: 2px;
  background: rgba(255,255,255,0.06);
  border-radius: 2px;
  overflow: hidden;
}

.m-fill {
  height: 100%;
  background: rgba(255,255,255,0.4);
  border-radius: 2px;
  width: 0%;
  transition: width 1s cubic-bezier(0.4,0,0.2,1);
}

.m-val {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--text-2);
  min-width: 26px;
  text-align: right;
}

/* Info row */
.info-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 7px 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.info-row:last-child { border-bottom: none; }

.i-key {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.08em;
  color: var(--text-3);
  text-transform: uppercase;
}

.i-val {
  font-size: 12px;
  color: var(--text-2);
  text-align: right;
}

/* Tags */
.tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 4px;
}

.tag {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 4px 9px;
  border-radius: 6px;
  border: 1px solid rgba(255,255,255,0.1);
  color: var(--text-3);
  background: rgba(255,255,255,0.03);
}

.tag.hi {
  border-color: rgba(255,255,255,0.22);
  color: var(--text-2);
  background: rgba(255,255,255,0.07);
}

/* Error card */
.error-card {
  padding: 20px;
  text-align: center;
}

.error-card p {
  font-size: 12px;
  color: rgba(255,120,120,0.7);
  line-height: 1.6;
  font-family: 'DM Mono', monospace;
}

/* Fade-in animation */
.card { opacity: 0; transform: translateY(6px); transition: opacity 0.35s, transform 0.35s; }
.card.visible { opacity: 1; transform: translateY(0); }

/* ── Toast ── */
.toast {
  position: fixed;
  bottom: 20px; left: 50%; transform: translateX(-50%) translateY(12px);
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.06em;
  color: var(--text-2);
  background: rgba(20,20,30,0.85);
  border: 1px solid rgba(255,255,255,0.1);
  padding: 9px 18px;
  border-radius: 10px;
  backdrop-filter: blur(20px);
  opacity: 0;
  transition: all 0.3s;
  white-space: nowrap;
  z-index: 100;
}

.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

@media (max-width: 800px) {
  .content { grid-template-columns: 1fr; grid-template-rows: 50vh 1fr; }
  html, body { overflow: auto; }
  .shell { height: auto; overflow: auto; }
}
</style>
</head>
<body>

<div class="bg"></div>

<div class="shell">
  <header>
    <div class="wordmark">face<span>.</span>analysis</div>
    <div class="header-right">
      <div class="dot" id="dot"></div>
      <span id="status-text">ready</span>
    </div>
  </header>

  <div class="content">

    <!-- Left: upload/preview -->
    <div class="glass" id="left-panel">
      <!-- Upload zone -->
      <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-input').click()">
        <div class="upload-icon">🖼</div>
        <div class="upload-label">Drop a photo or click to upload</div>
        <div class="upload-sub">jpg · png · webp</div>
      </div>

      <!-- Image preview -->
      <div class="img-wrap" id="img-wrap">
        <img id="preview-img" src="" alt="">
        <div class="scan-overlay" id="scan-overlay">
          <div class="scan-ring"></div>
          <div class="scan-text">SCANNING</div>
        </div>
        <div class="scan-line" id="scan-line" style="display:none"></div>
        <div class="img-meta" id="img-meta" style="display:none">
          <div class="img-badge" id="img-filename">photo.jpg</div>
          <button class="reupload-btn" onclick="resetUpload()">Change photo</button>
        </div>
      </div>

      <button class="analyze-btn" id="analyze-btn" onclick="runAnalysis()">
        Analyze face
      </button>

      <input type="file" id="file-input" accept="image/*" onchange="handleFile(event)">
    </div>

    <!-- Right: results -->
    <div class="results-col" id="results-col">
      <div class="glass" style="flex:1">
        <div class="empty-state" id="empty-state">
          <div class="empty-icon">◎</div>
          <div class="empty-title">No analysis yet</div>
          <div class="empty-sub">Upload a photo and press<br>Analyze face</div>
        </div>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let currentBase64 = null;
let currentFileName = '';

function handleFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  currentFileName = file.name;

  const reader = new FileReader();
  reader.onload = ev => {
    const dataUrl = ev.target.result;
    // base64 without prefix
    currentBase64 = dataUrl.split(',')[1];
    showPreview(dataUrl);
  };
  reader.readAsDataURL(file);
  // reset so same file can be re-selected
  e.target.value = '';
}

function showPreview(src) {
  document.getElementById('upload-zone').style.display = 'none';
  const wrap = document.getElementById('img-wrap');
  wrap.style.display = 'block';
  document.getElementById('preview-img').src = src;
  document.getElementById('img-filename').textContent = currentFileName;
  document.getElementById('img-meta').style.display = 'flex';
  document.getElementById('analyze-btn').style.display = 'block';
}

function resetUpload() {
  currentBase64 = null;
  document.getElementById('upload-zone').style.display = 'flex';
  document.getElementById('img-wrap').style.display = 'none';
  document.getElementById('analyze-btn').style.display = 'none';
  document.getElementById('scan-overlay').classList.remove('show');
  document.getElementById('scan-line').style.display = 'none';
  setStatus('ready');
  // Reset results
  const col = document.getElementById('results-col');
  col.innerHTML = `<div class="glass" style="flex:1"><div class="empty-state" id="empty-state"><div class="empty-icon">◎</div><div class="empty-title">No analysis yet</div><div class="empty-sub">Upload a photo and press<br>Analyze face</div></div></div>`;
}

async function runAnalysis() {
  if (!currentBase64) return;

  setStatus('scanning');
  document.getElementById('scan-overlay').classList.add('show');
  document.getElementById('scan-line').style.display = 'block';
  document.getElementById('analyze-btn').disabled = true;
  document.getElementById('img-meta').style.display = 'none';

  // Reset results col
  const col = document.getElementById('results-col');
  col.innerHTML = '';

  try {
    const result = await callClaude(currentBase64);
    renderResults(result);
  } catch(err) {
    col.innerHTML = `<div class="glass card visible error-card"><p>Error: ${err.message}</p></div>`;
    toast('Analysis failed');
  } finally {
    document.getElementById('scan-overlay').classList.remove('show');
    document.getElementById('scan-line').style.display = 'none';
    document.getElementById('analyze-btn').disabled = false;
    document.getElementById('img-meta').style.display = 'flex';
    setStatus('ready');
  }
}

async function callClaude(base64) {
  const PROMPT = `You are a precise facial analysis system. Analyze this face photo and return ONLY a valid JSON object with NO extra text, NO markdown, NO backticks.

Return exactly this structure:
{
  "score": <number 1.0-10.0, one decimal>,
  "grade": <"Exceptional" | "Very Good" | "Good" | "Average" | "Below Average">,
  "summary": <one sentence, max 12 words>,
  "age_estimate": <number>,
  "gender": <"Male" | "Female" | "Ambiguous">,
  "face_shape": <"Oval" | "Round" | "Square" | "Heart" | "Diamond" | "Oblong">,
  "expression": <one word>,
  "metrics": {
    "symmetry": <0-10>,
    "proportions": <0-10>,
    "cheekbones": <0-10>,
    "jawline": <0-10>,
    "eyes": <0-10>,
    "nose": <0-10>,
    "lips": <0-10>
  },
  "highlights": [<2-4 short strings of notable features>],
  "no_face": <true if no human face detected, false otherwise>
}

Base scores on facial geometry, golden ratio proximity, symmetry, and feature definition. Be honest and precise.`;

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      messages: [{
        role: 'user',
        content: [
          {
            type: 'image',
            source: { type: 'base64', media_type: 'image/jpeg', data: base64 }
          },
          { type: 'text', text: PROMPT }
        ]
      }]
    })
  });

  if (!res.ok) {
    const e = await res.json().catch(() => ({}));
    throw new Error(e?.error?.message || `HTTP ${res.status}`);
  }

  const data = await res.json();
  const raw = data.content?.find(b => b.type === 'text')?.text || '';

  // Strip any accidental markdown fences
  const clean = raw.replace(/```json|```/g, '').trim();
  const parsed = JSON.parse(clean);

  if (parsed.no_face) throw new Error('No human face detected in this image');
  return parsed;
}

function renderResults(d) {
  const col = document.getElementById('results-col');
  col.innerHTML = '';

  const cards = [
    buildScoreCard(d),
    buildMetricsCard(d.metrics),
    buildInfoCard(d),
    buildTagsCard(d),
  ];

  cards.forEach((html, i) => {
    const el = document.createElement('div');
    el.className = 'glass card';
    el.innerHTML = html;
    col.appendChild(el);
    setTimeout(() => el.classList.add('visible'), i * 80 + 40);
  });

  // Animate bars
  setTimeout(() => {
    // score fill
    const scoreEl = col.querySelector('.score-fill');
    if (scoreEl) scoreEl.style.width = (d.score * 10) + '%';
    // metric bars
    col.querySelectorAll('.m-fill[data-pct]').forEach(b => {
      b.style.width = b.dataset.pct + '%';
    });
  }, 120);
}

function buildScoreCard(d) {
  return `
    <div class="card-header">overall score</div>
    <div class="score-main">
      <div class="score-num">${d.score.toFixed(1)}</div>
      <div class="score-denom">/ 10</div>
      <div class="score-label">${d.grade}</div>
    </div>
    <div class="score-track"><div class="score-fill"></div></div>
    <div class="score-desc">${d.summary}</div>
  `;
}

function buildMetricsCard(m) {
  const items = [
    ['Symmetry', m.symmetry],
    ['Proportions', m.proportions],
    ['Cheekbones', m.cheekbones],
    ['Jawline', m.jawline],
    ['Eyes', m.eyes],
    ['Nose', m.nose],
    ['Lips', m.lips],
  ];
  return `
    <div class="card-header">facial metrics</div>
    ${items.map(([n, v]) => {
      const pct = Math.round(v * 10);
      return `<div class="metric">
        <div class="m-name">${n}</div>
        <div class="m-track"><div class="m-fill" data-pct="${pct}"></div></div>
        <div class="m-val">${v.toFixed(1)}</div>
      </div>`;
    }).join('')}
  `;
}

function buildInfoCard(d) {
  return `
    <div class="card-header">face profile</div>
    <div class="info-row"><span class="i-key">Age</span><span class="i-val">~${d.age_estimate} yrs</span></div>
    <div class="info-row"><span class="i-key">Gender</span><span class="i-val">${d.gender}</span></div>
    <div class="info-row"><span class="i-key">Face shape</span><span class="i-val">${d.face_shape}</span></div>
    <div class="info-row"><span class="i-key">Expression</span><span class="i-val">${d.expression}</span></div>
  `;
}

function buildTagsCard(d) {
  const tags = d.highlights || [];
  return `
    <div class="card-header">notable features</div>
    <div class="tags">
      ${tags.map((t, i) => `<span class="tag ${i < 2 ? 'hi' : ''}">${t}</span>`).join('')}
    </div>
  `;
}

function setStatus(s) {
  const dot = document.getElementById('dot');
  const txt = document.getElementById('status-text');
  const map = {
    ready:    { t:'ready',    c:'rgba(100,210,160,0.8)', s:'0 0 8px rgba(100,210,160,0.5)' },
    scanning: { t:'scanning', c:'rgba(180,160,255,0.9)', s:'0 0 10px rgba(160,130,255,0.6)' },
    error:    { t:'error',    c:'rgba(255,100,100,0.8)', s:'0 0 8px rgba(255,80,80,0.5)' },
  };
  const cfg = map[s] || map.ready;
  txt.textContent = cfg.t;
  dot.style.background = cfg.c;
  dot.style.boxShadow = cfg.s;
}

let _toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 3200);
}
</script>
</body>
</html>
