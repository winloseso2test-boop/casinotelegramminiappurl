<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Face Analysis</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Mono&family=DM+Sans:wght@300;400&display=swap');
        body { margin: 0; background: #0d0d14; color: white; font-family: 'DM Sans', sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef } = React;
        const API_KEY = "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";

        const PROMPT = `Analyze this face. Return ONLY valid JSON (no backticks, no text): {"score": 0.0, "grade": "Average", "summary": "...", "age_estimate": 25, "gender": "Male", "face_shape": "Oval", "expression": "Neutral", "metrics": {"symmetry": 5.0, "proportions": 5.0, "cheekbones": 5.0, "jawline": 5.0, "eyes": 5.0, "nose": 5.0, "lips": 5.0}, "highlights": ["Feature"], "no_face": false}`;

        function FaceAnalysis() {
            const [phase, setPhase] = useState("idle");
            const [imgSrc, setImgSrc] = useState(null);
            const [b64, setB64] = useState(null);
            const [result, setResult] = useState(null);
            const fileRef = useRef();

            const handleFile = (e) => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = (ev) => {
                    setImgSrc(ev.target.result);
                    setB64(ev.target.result.split(",")[1]);
                    setPhase("preview");
                };
                reader.readAsDataURL(file);
            };

            const analyze = async () => {
                setPhase("scanning");
                try {
                    const res = await fetch("https://api.openai.com/v1/chat/completions", {
                        method: "POST",
                        headers: { "Content-Type": "application/json", "Authorization": `Bearer ${API_KEY}` },
                        body: JSON.stringify({
                            model: "gpt-4o",
                            messages: [{ role: "user", content: [{ type: "text", text: PROMPT }, { type: "image_url", image_url: { url: `data:image/jpeg;base64,${b64}` } }] }]
                        })
                    });
                    const data = await res.json();
                    setResult(JSON.parse(data.choices[0].message.content));
                    setPhase("done");
                } catch(e) { alert("Error: " + e.message); setPhase("idle"); }
            };

            return (
                <div style={{padding: 20}}>
                    {phase === "idle" && <button onClick={() => fileRef.current.click()}>Upload Photo</button>}
                    {phase === "preview" && <button onClick={analyze}>Analyze</button>}
                    <input ref={fileRef} type="file" style={{display:"none"}} onChange={handleFile} />
                    {imgSrc && <img src={imgSrc} style={{width: 200, display: "block"}} />}
                    {phase === "scanning" && <p>Scanning...</p>}
                    {result && <pre style={{background: "#222", padding: 10}}>{JSON.stringify(result, null, 2)}</pre>}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<FaceAnalysis />);
    </script>
</body>
</html>
