<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Дурак — Онлайн</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap');
:root{--felt:#1a4a2e;--felt-dark:#112d1c;--felt-light:#236338;--gold:#c9a84c;--gold-light:#e8cc7a;--cream:#f5eed8;--red:#c0392b;--blk:#1a1a1a;--cw:68px;--ch:98px;--shadow:0 4px 20px rgba(0,0,0,.5)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Crimson Pro',serif;background:radial-gradient(ellipse at center,var(--felt-light) 0%,var(--felt-dark) 100%);min-height:100vh;color:var(--cream);overflow-x:hidden;user-select:none}

/* LOBBY */
#lobby{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.lcard{background:linear-gradient(135deg,#0d2b1a,#1a4a2e);border:2px solid var(--gold);border-radius:16px;padding:36px;max-width:460px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.7),inset 0 1px 0 rgba(201,168,76,.3);text-align:center}
.gtitle{font-family:'Playfair Display',serif;font-size:clamp(2.2rem,8vw,3.8rem);font-weight:900;color:var(--gold);text-shadow:0 0 30px rgba(201,168,76,.4);letter-spacing:2px;margin-bottom:6px}
.gsub{font-size:1.05rem;color:rgba(245,238,216,.6);margin-bottom:32px;font-style:italic}
.btn{display:block;width:100%;padding:14px 20px;border:none;border-radius:8px;font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700;cursor:pointer;transition:all .2s;margin-bottom:10px;letter-spacing:.5px}
.btn-p{background:linear-gradient(135deg,var(--gold),#a07830);color:var(--blk);box-shadow:0 4px 15px rgba(201,168,76,.3)}
.btn-p:hover{transform:translateY(-2px);box-shadow:0 6px 25px rgba(201,168,76,.5)}
.btn-s{background:rgba(255,255,255,.08);color:var(--cream);border:1px solid rgba(201,168,76,.4)}
.btn-s:hover{background:rgba(255,255,255,.14);border-color:var(--gold)}
.divider{display:flex;align-items:center;gap:12px;margin:18px 0;color:rgba(245,238,216,.4);font-size:.9rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(201,168,76,.25)}
.igrp{margin-bottom:12px;text-align:left}
.igrp label{display:block;margin-bottom:5px;font-size:.92rem;color:rgba(245,238,216,.7)}
.igrp input{width:100%;padding:11px 14px;background:rgba(0,0,0,.3);border:1px solid rgba(201,168,76,.3);border-radius:8px;color:var(--cream);font-size:1.05rem;font-family:'Crimson Pro',serif;letter-spacing:2px;text-align:center;outline:none;transition:border-color .2s}
.igrp input:focus{border-color:var(--gold)}
.igrp input::placeholder{letter-spacing:1px;opacity:.4}
.room-box{background:rgba(0,0,0,.4);border:2px dashed var(--gold);border-radius:10px;padding:18px;margin:18px 0}
.room-id{font-family:'Playfair Display',serif;font-size:2.2rem;font-weight:700;color:var(--gold);letter-spacing:6px}
.room-hint{font-size:.85rem;color:rgba(245,238,216,.55);margin-top:6px;font-style:italic}
.smsg{padding:11px;border-radius:8px;margin-top:14px;font-size:.92rem}
.sw{background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.3);color:var(--gold-light);animation:pulse 2s infinite}
.sc{background:rgba(46,139,87,.2);border:1px solid rgba(46,139,87,.5);color:#5dce8a}
.se{background:rgba(192,57,43,.2);border:1px solid rgba(192,57,43,.5);color:#e74c3c}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
.plist{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:14px}
.pchip{background:rgba(0,0,0,.3);border:1px solid rgba(201,168,76,.4);border-radius:20px;padding:5px 12px;font-size:.85rem;display:flex;align-items:center;gap:6px}
.pchip .dot{width:8px;height:8px;border-radius:50%;background:#5dce8a}
.cbtn{background:transparent;border:1px solid rgba(201,168,76,.4);color:var(--gold);border-radius:6px;padding:4px 10px;cursor:pointer;font-size:.78rem;margin-top:8px;transition:all .2s}
.cbtn:hover{background:rgba(201,168,76,.15)}

/* GAME */
#game{display:none;flex-direction:column;height:100vh;padding:6px;gap:5px}
.top-area{display:flex;justify-content:space-between;align-items:flex-start;gap:6px;flex-wrap:wrap}
.pzone{flex:1;min-width:110px}
.pnbadge{display:inline-flex;align-items:center;gap:5px;background:rgba(0,0,0,.4);border:1px solid rgba(201,168,76,.35);border-radius:20px;padding:3px 10px;font-size:.82rem;margin-bottom:5px}
.tarrow{color:var(--gold);animation:bounce .6s infinite alternate}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-4px)}}
.tbadge{font-size:.72rem;color:var(--gold);font-style:italic;margin-left:3px;animation:pulse 1s infinite}
.hand{display:flex;flex-wrap:wrap;gap:3px;min-height:55px}
.card{width:var(--cw);height:var(--ch);border-radius:7px;border:2px solid #ddd;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:3px;cursor:pointer;transition:transform .15s,box-shadow .15s;position:relative;box-shadow:var(--shadow);flex-shrink:0}
.card:hover{transform:translateY(-8px);box-shadow:0 10px 30px rgba(0,0,0,.6)}
.card.sel{transform:translateY(-14px);border-color:var(--gold);box-shadow:0 0 0 3px var(--gold)}
.card.play{border-color:#5dce8a;box-shadow:0 0 0 2px #5dce8a}
.card.unplay{opacity:.45;cursor:default}
.cr{font-size:.82rem;font-weight:700;line-height:1}
.cs{font-size:1.8rem;line-height:1}
.card.red .cr,.card.red .cs{color:var(--red)}
.card.blk .cr,.card.blk .cs{color:var(--blk)}
.cback{width:var(--cw);height:var(--ch);border-radius:7px;border:2px solid rgba(201,168,76,.5);background:repeating-linear-gradient(45deg,#1a3a7a,#1a3a7a 5px,#2a5aaa 5px,#2a5aaa 10px);box-shadow:var(--shadow);flex-shrink:0}
.mid{flex:1;display:flex;gap:6px;align-items:stretch;min-height:0}
.tzone{flex:1;background:rgba(0,0,0,.25);border:2px solid rgba(201,168,76,.2);border-radius:10px;padding:8px;display:flex;flex-direction:column;gap:5px;overflow-y:auto;min-width:0}
.tpair{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.tpair .arr{color:var(--gold);font-size:1.1rem}
.deck-area{display:flex;flex-direction:column;align-items:center;gap:6px;min-width:84px}
.dstack{position:relative;width:var(--cw);height:var(--ch)}
.dcnt{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.75);color:var(--gold);font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;z-index:10}
.tlabel{font-size:.72rem;color:rgba(245,238,216,.6);text-transform:uppercase;letter-spacing:1px}
.discard{width:var(--cw);height:var(--ch);border:2px dashed rgba(201,168,76,.25);border-radius:7px;display:flex;align-items:center;justify-content:center;color:rgba(245,238,216,.3);font-size:.72rem;text-align:center}
.abar{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;padding:3px}
.abtn{padding:9px 20px;border-radius:8px;border:none;font-family:'Playfair Display',serif;font-size:.95rem;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.5px}
.abtn:disabled{opacity:.3;cursor:default;transform:none!important}
.bbeat{background:linear-gradient(135deg,#2e7d32,#1b5e20);color:#a5d6a7}
.btake{background:linear-gradient(135deg,#c62828,#7b1010);color:#ffcdd2}
.bpass{background:linear-gradient(135deg,#455a64,#263238);color:#b0bec5}
.abtn:not(:disabled):hover{transform:translateY(-2px);box-shadow:0 4px 15px rgba(0,0,0,.4)}
.ibar{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;font-size:.78rem;color:rgba(245,238,216,.6)}
.ichip{background:rgba(0,0,0,.3);border:1px solid rgba(201,168,76,.2);border-radius:12px;padding:2px 9px}
.ichip strong{color:var(--gold)}
.glog{max-height:55px;overflow-y:auto;font-size:.76rem;color:rgba(245,238,216,.55);font-style:italic;text-align:center}
.glog div:last-child{color:rgba(245,238,216,.85)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(4px)}
.ocard{background:linear-gradient(135deg,#0d2b1a,#1a4a2e);border:2px solid var(--gold);border-radius:16px;padding:36px;text-align:center;max-width:380px;width:90%;box-shadow:0 30px 80px rgba(0,0,0,.8)}
.otitle{font-family:'Playfair Display',serif;font-size:2.3rem;font-weight:900;margin-bottom:10px}
.osub{font-size:1.05rem;color:rgba(245,238,216,.7);margin-bottom:22px}
.gold{color:var(--gold)}.red-t{color:#e74c3c}.green-t{color:#5dce8a}
@media(max-width:560px){:root{--cw:50px;--ch:72px}.cs{font-size:1.35rem}.cr{font-size:.68rem}.deck-area{min-width:64px}.abtn{padding:7px 12px;font-size:.85rem}}
</style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby">
  <div class="lcard">
    <div class="gtitle">♠ Дурак ♠</div>
    <div class="gsub">Подкидной · Онлайн</div>

    <div class="igrp">
      <label>Ваше имя</label>
      <input id="nameInput" type="text" maxlength="14" placeholder="Игрок" value="Игрок">
    </div>

    <button class="btn btn-p" onclick="createRoom()">🃏 Создать комнату</button>

    <div class="divider">или</div>

    <div class="igrp">
      <label>Код комнаты</label>
      <input id="codeInput" type="text" maxlength="600" placeholder="ABC123">
    </div>
    <button class="btn btn-s" onclick="joinRoom()">🚪 Войти в комнату</button>

    <div id="lobbyStatus"></div>
  </div>
</div>

<!-- GAME -->
<div id="game">
  <div class="top-area" id="opArea"></div>
  <div class="mid">
    <div class="tzone" id="tzone"><div style="color:rgba(245,238,216,.3);font-size:.82rem;text-align:center;margin:auto" id="tempty">Стол пуст</div></div>
    <div class="deck-area">
      <div class="tlabel">Козырь</div>
      <div id="trumpCard"></div>
      <div class="dstack">
        <div class="cback" id="deckBack"></div>
        <div class="dcnt" id="deckCnt">36</div>
      </div>
      <div class="tlabel">Биток</div>
      <div class="discard" id="discardPile">пусто</div>
    </div>
  </div>
  <div class="abar" id="abar">
    <button class="abtn bbeat" id="btnBeat" disabled onclick="doAction({type:'BEAT'})">✓ Бито</button>
    <button class="abtn btake" id="btnTake" disabled onclick="doAction({type:'TAKE'})">↙ Беру</button>
    <button class="abtn bpass" id="btnPass" disabled onclick="doAction({type:'PASS'})">→ Пас</button>
  </div>
  <div>
    <div class="pnbadge">
      <span id="myNm">Я</span>
      <span id="myArr" class="tarrow" style="display:none">▶</span>
    </div>
    <div class="hand" id="myHand"></div>
  </div>
  <div class="ibar">
    <span class="ichip">Комната: <strong id="roomDisp">—</strong></span>
    <span class="ichip" id="trumpChip">Козырь: <strong>—</strong></span>
    <span class="ichip" id="phaseChip">—</span>
  </div>
  <div class="glog" id="glog"></div>
</div>

<div class="overlay" id="overlay" style="display:none">
  <div class="ocard">
    <div class="otitle" id="oTitle"></div>
    <div class="osub" id="oSub"></div>
    <button class="btn btn-p" style="max-width:200px;margin:0 auto" onclick="restartGame()">↺ Снова</button>
    <button class="btn btn-s" style="max-width:200px;margin:0 auto;margin-top:8px" onclick="goLobby()">⬅ Лобби</button>
  </div>
</div>

<script>
// ══════════ CONSTANTS ══════════
const SUITS=['♠','♥','♦','♣'];
const RANKS=['6','7','8','9','10','J','Q','K','A'];
const RV={'6':6,'7':7,'8':8,'9':9,'10':10,'J':11,'Q':12,'K':13,'A':14};
const RED=new Set(['♥','♦']);

// ══════════ STATE ══════════
let peer=null, conns=[], roomId='', myId='', isHost=false, myName='Игрок';
let players=[], myIndex=-1;
let G=null;

// ══════════ PEER SETUP ══════════
function initPeer(id) {
  return new Promise((res,rej)=>{
    peer = id
      ? new Peer(id, {debug:0})
      : new Peer({debug:0});
    peer.on('open', pid => { myId=pid; res(pid); });
    peer.on('error', e => rej(e));
    setTimeout(()=>rej(new Error('timeout')),15000);
  });
}

function setupConn(conn) {
  conn.on('data', d => handleMsg(conn.peer, d));
  conn.on('close', () => {
    conns = conns.filter(c=>c.peer!==conn.peer);
    addLog('Игрок отключился');
  });
}

function broadcast(data) {
  conns.forEach(c=>{ try{c.send(data)}catch(e){} });
}

function sendTo(peerId, data) {
  const c = conns.find(c=>c.peer===peerId);
  if(c) try{c.send(data)}catch(e){}
}

// ══════════ MESSAGES ══════════
function handleMsg(fromId, msg) {
  if(msg.type==='JOIN') {
    if(!isHost) return;
    // Register new player
    if(!players.find(p=>p.id===fromId)) {
      players.push({id:fromId, name:msg.name, seat:players.length});
    }
    // Tell everyone current player list
    broadcast({type:'PLAYERS', players});
    // Ack to joiner
    sendTo(fromId,{type:'JOINED', roomId, players});
    updateLobbyUI();
  }
  else if(msg.type==='PLAYERS') {
    players = msg.players;
    myIndex = players.findIndex(p=>p.id===myId);
    updateLobbyUI();
  }
  else if(msg.type==='JOINED') {
    roomId = msg.roomId;
    players = msg.players;
    myIndex = players.findIndex(p=>p.id===myId);
    showStatus(`<span style="color:#5dce8a">✓ Подключено к <strong>${roomId}</strong>. Ждём хоста...</span>`,'sc');
    updateLobbyUI();
  }
  else if(msg.type==='START') {
    players = msg.players;
    myIndex = players.findIndex(p=>p.id===myId);
    G = msg.G;
    showGame();
  }
  else if(msg.type==='STATE') {
    G = msg.G;
    players = msg.players;
    myIndex = players.findIndex(p=>p.id===myId);
    renderGame();
    if(G.phase==='done') showOverlay();
  }
  else if(msg.type==='ACTION') {
    if(!isHost) return;
    processAction(fromId, msg.action);
  }
  else if(msg.type==='RESTART') {
    if(isHost) hostStart();
  }
}

// ══════════ LOBBY ══════════
function showStatus(html, cls='') {
  document.getElementById('lobbyStatus').innerHTML=`<div class="smsg ${cls}">${html}</div>`;
}

async function createRoom() {
  myName = document.getElementById('nameInput').value.trim()||'Игрок';
  isHost=true;
  showStatus('⏳ Подключение...','sw');
  try {
    const pid = await initPeer();
    roomId = pid.slice(-6).toUpperCase();
    myId = pid;
    players=[{id:myId, name:myName, seat:0}];
    myIndex=0;

    peer.on('connection', conn=>{
      conn.on('open',()=>{ conns.push(conn); setupConn(conn); });
    });

    document.getElementById('lobbyStatus').innerHTML=`
      <div class="room-box">
        <div class="room-hint">Код комнаты — отправь другу:</div>
        <div class="room-id">${roomId}</div>
        <button class="cbtn" onclick="copyCode()">📋 Скопировать</button>
      </div>
      <div class="smsg sw">⏳ Ожидание игроков... (нужно 2-4)</div>
      <div class="plist" id="plist"></div>
      <div id="startArea"></div>
    `;
    updateLobbyUI();
  } catch(e) {
    showStatus('❌ Ошибка подключения: '+e.message,'se');
  }
}

async function joinRoom() {
  const code = document.getElementById('codeInput').value.trim().toUpperCase();
  if(code.length<4){showStatus('Введите код комнаты','se');return;}
  myName = document.getElementById('nameInput').value.trim()||'Игрок';
  isHost=false;
  showStatus('⏳ Подключение...','sw');
  try {
    const pid = await initPeer();
    myId=pid;

    // Host peer id ends with the 6-char room code (uppercase)
    // We need to find the full peer ID — use PeerJS server lookup
    // We'll connect to a known prefix + code
    // Actually: host's last 6 chars = roomId, so we search
    // Simple approach: host shares full peer ID as room code
    // Let's make room code = full peer ID for reliability
    // But code might be long... Let's store mapping via a free keyval service

    // Approach: use jsonbin.io free tier to store host peer ID
    showStatus('⏳ Поиск комнаты...','sw');
    const resp = await fetch(`https://api.jsonbin.io/v3/b/${code}`, {
      headers:{'X-Access-Key':'$2a$10$placeholder'}
    }).catch(()=>null);

    // Fallback: try direct connection with peer ID = code
    // We'll encode host's peer id into a short shareable via a relay
    // Simplest: just use peer ID directly as room code
    showStatus('⏳ Соединение...','sw');
    const conn = peer.connect(code, {reliable:true, metadata:{name:myName}});
    conns=[conn];
    conn.on('open',()=>{
      setupConn(conn);
      conn.send({type:'JOIN', name:myName});
    });
    conn.on('error', e=>showStatus('❌ Комната не найдена. Проверь код.','se'));
    peer.on('error', e=>showStatus('❌ '+e.message,'se'));
  } catch(e) {
    showStatus('❌ Ошибка: '+e.message,'se');
  }
}

function updateLobbyUI() {
  const pl=document.getElementById('plist');
  const sa=document.getElementById('startArea');
  if(!pl) return;
  pl.innerHTML=players.map(p=>`
    <span class="pchip"><span class="dot"></span>${p.name}${p.id===myId?' (вы)':''}</span>
  `).join('');
  if(sa && isHost) {
    if(players.length>=2) {
      sa.innerHTML=`<button class="btn btn-p" style="margin-top:14px" onclick="hostStart()">🃏 Начать игру (${players.length} игрока)</button>`;
    } else {
      sa.innerHTML=`<div style="color:rgba(245,238,216,.5);margin-top:10px;font-size:.88rem">Нужно минимум 2 игрока</div>`;
    }
  }
}

function copyCode() {
  navigator.clipboard.writeText(myId||roomId).catch(()=>{});
  const b=document.querySelector('.cbtn');
  if(b){b.textContent='✓ Скопировано!';setTimeout(()=>b.textContent='📋 Скопировать',2000);}
}

// ══════════ GAME INIT ══════════
function hostStart() {
  G = createState(players);
  broadcast({type:'START', G, players});
  showGame();
}

function createState(plist) {
  let deck=[];
  for(const s of SUITS) for(const r of RANKS) deck.push({suit:s,rank:r});
  for(let i=deck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[deck[i],deck[j]]=[deck[j],deck[i]];}
  const hands={};
  for(const p of plist){hands[p.id]=[];for(let i=0;i<6;i++)if(deck.length)hands[p.id].push(deck.pop());}
  const trump=deck[0]||null;
  const trumpSuit=trump?trump.suit:SUITS[0];
  let ai=0,lt=null;
  for(let i=0;i<plist.length;i++)
    for(const c of hands[plist[i].id])
      if(c.suit===trumpSuit&&(!lt||RV[c.rank]<RV[lt.rank])){lt=c;ai=i;}
  return {deck,trump,trumpSuit,table:[],phase:'attack',attackerIdx:ai,defenderIdx:(ai+1)%plist.length,hands,discardCount:0,durakId:null,log:['Игра началась! Козырь: '+(trump?trump.rank+trump.suit:'?')]};
}

// ══════════ ACTIONS ══════════
function doAction(action) {
  if(isHost) processAction(myId,action);
  else broadcast({type:'ACTION', action});
}

function processAction(fromId, action) {
  if(!isHost||!G) return;
  const pi=players.findIndex(p=>p.id===fromId);
  if(pi<0) return;
  const ok=applyAction(pi,action);
  if(ok){
    checkEnd();
    broadcast({type:'STATE',G,players});
    renderGame();
  }
}

function canAttack(pi){
  if(G.phase==='done') return false;
  if(pi===G.defenderIdx) return false;
  if(G.phase==='defense'){
    const defH=G.hands[players[G.defenderIdx].id];
    const und=G.table.filter(t=>!t.defense).length;
    if(und>=defH.length) return false;
  }
  return true;
}
function validAtk(card){if(G.table.length===0)return true;const rs=new Set(G.table.flatMap(t=>[t.attack.rank,t.defense?.rank].filter(Boolean)));return rs.has(card.rank);}
function validDef(atk,def){if(def.suit===atk.suit)return RV[def.rank]>RV[atk.rank];if(def.suit===G.trumpSuit&&atk.suit!==G.trumpSuit)return true;return false;}

function applyAction(pi,action) {
  const p=players[pi], hand=G.hands[p.id];
  if(action.type==='ATTACK'){
    if(!canAttack(pi)) return false;
    const card=hand.find(c=>c.rank===action.card.rank&&c.suit===action.card.suit);
    if(!card||!validAtk(card)) return false;
    hand.splice(hand.indexOf(card),1);
    G.table.push({attack:card,defense:null});
    G.phase='defense';
    addLog(p.name+' атакует '+cs(card));
    return true;
  }
  if(action.type==='DEFEND'){
    if(pi!==G.defenderIdx) return false;
    const tp=G.table.find(t=>!t.defense&&t.attack.rank===action.attack.rank&&t.attack.suit===action.attack.suit);
    if(!tp) return false;
    const dc=hand.find(c=>c.rank===action.card.rank&&c.suit===action.card.suit);
    if(!dc||!validDef(tp.attack,dc)) return false;
    hand.splice(hand.indexOf(dc),1);
    tp.defense=dc;
    addLog(p.name+' отбивает '+cs(dc));
    if(G.table.every(t=>t.defense)) G.phase='attack';
    return true;
  }
  if(action.type==='BEAT'){
    if(pi!==G.attackerIdx) return false;
    if(!G.table.every(t=>t.defense)) return false;
    G.discardCount+=G.table.length*2; G.table=[];
    addLog('Бито!'); advTurn(false); deal(); return true;
  }
  if(action.type==='TAKE'){
    if(pi!==G.defenderIdx) return false;
    const all=G.table.flatMap(t=>[t.attack,t.defense].filter(Boolean));
    G.hands[p.id].push(...all); G.table=[];
    addLog(p.name+' берёт'); advTurnTake(); deal(); return true;
  }
  if(action.type==='PASS'){
    if(pi===G.defenderIdx) return false;
    addLog(p.name+' пас'); return true;
  }
  return false;
}

function advTurn(){const n=players.length;G.attackerIdx=G.defenderIdx;G.defenderIdx=(G.attackerIdx+1)%n;G.phase='attack';}
function advTurnTake(){const n=players.length;G.attackerIdx=(G.defenderIdx+1)%n;G.defenderIdx=(G.attackerIdx+1)%n;G.phase='attack';}
function deal(){
  const ord=[];let i=G.attackerIdx;
  for(let k=0;k<players.length;k++){if(i!==G.defenderIdx)ord.push(i);i=(i+1)%players.length;}
  ord.push(G.defenderIdx);
  for(const idx of ord){const pid=players[idx].id;while(G.hands[pid].length<6&&G.deck.length>0)G.hands[pid].push(G.deck.pop());}
}
function checkEnd(){
  if(G.deck.length>0) return;
  const w=players.filter(p=>G.hands[p.id].length>0);
  if(w.length<=1){G.phase='done';G.durakId=w.length===1?w[0].id:null;addLog(w.length===1?w[0].name+' — ДУРАК!':'Ничья!');}
}
function addLog(m){G.log.unshift(m);if(G.log.length>20)G.log.pop();}
function cs(c){return c.rank+c.suit;}

// ══════════ RENDER ══════════
function showGame(){
  document.getElementById('lobby').style.display='none';
  document.getElementById('game').style.display='flex';
  document.getElementById('roomDisp').textContent=myId.slice(-6).toUpperCase();
  renderGame();
}

function renderGame(){
  if(!G||!players.length) return;
  if(myIndex<0) myIndex=players.findIndex(p=>p.id===myId);
  const me=players[myIndex]; if(!me) return;

  // Trump
  const tc=document.getElementById('trumpCard');
  tc.innerHTML=''; if(G.trump) tc.appendChild(mkCard(G.trump,false,false));

  // Deck
  document.getElementById('deckCnt').textContent=G.deck.length;
  document.getElementById('deckBack').style.display=G.deck.length>0?'':'none';
  document.getElementById('discardPile').textContent=G.discardCount>0?G.discardCount+' карт':'пусто';

  // Info
  document.getElementById('trumpChip').innerHTML='Козырь: <strong style="color:'+(RED.has(G.trumpSuit)?'#e74c3c':'#e0e0e0')+'">'+G.trumpSuit+'</strong>';
  const pn={attack:'Атака',defense:'Защита',done:'Конец'};
  document.getElementById('phaseChip').innerHTML='<strong>'+( pn[G.phase]||G.phase)+'</strong>';

  // Opponents
  const oa=document.getElementById('opArea'); oa.innerHTML='';
  for(let i=0;i<players.length;i++){
    if(i===myIndex) continue;
    const p=players[i], hand=G.hands[p.id]||[];
    const isTurn=isOppTurn(i);
    const z=document.createElement('div'); z.className='pzone';
    const b=document.createElement('div'); b.className='pnbadge';
    b.innerHTML=(i===G.attackerIdx?'⚔ ':'')+(i===G.defenderIdx?'🛡 ':'')+p.name+(isTurn?'<span class="tbadge">думает...</span>':'');
    z.appendChild(b);
    const h=document.createElement('div'); h.className='hand';
    const show=Math.min(hand.length,7);
    for(let k=0;k<show;k++){const cb=document.createElement('div');cb.className='cback';h.appendChild(cb);}
    if(hand.length>show){const m=document.createElement('span');m.style.cssText='font-size:.78rem;color:rgba(245,238,216,.5);align-self:center';m.textContent='+' +(hand.length-show);h.appendChild(m);}
    z.appendChild(h); oa.appendChild(z);
  }

  // My badge
  document.getElementById('myNm').textContent=me.name+' (вы)';
  document.getElementById('myArr').style.display=isMyTurn()?'':'none';

  // My hand
  const mh=document.getElementById('myHand'); mh.innerHTML='';
  const myHand=G.hands[me.id]||[];
  const amDef=myIndex===G.defenderIdx;
  myHand.forEach(card=>{
    let play=false;
    if(G.phase!=='done'){
      if(amDef&&G.phase==='defense') play=G.table.some(t=>!t.defense&&validDef(t.attack,card));
      else if(canAttack(myIndex)) play=validAtk(card);
    }
    const el=mkCard(card,play,!play&&G.phase!=='done');
    el.addEventListener('click',()=>onCardClick(card,play,amDef));
    mh.appendChild(el);
  });

  // Table
  const tz=document.getElementById('tzone'); tz.innerHTML='';
  if(G.table.length===0){const e=document.createElement('div');e.style.cssText='color:rgba(245,238,216,.3);font-size:.82rem;text-align:center;margin:auto';e.textContent='Стол пуст';tz.appendChild(e);}
  else G.table.forEach(pair=>{
    const row=document.createElement('div'); row.className='tpair';
    row.appendChild(mkCard(pair.attack,false,false));
    if(pair.defense){const a=document.createElement('span');a.className='arr';a.textContent='→';row.appendChild(a);row.appendChild(mkCard(pair.defense,false,false));}
    tz.appendChild(row);
  });

  // Buttons
  const amAtk=myIndex===G.attackerIdx, done=G.phase==='done';
  document.getElementById('btnBeat').disabled=done||!amAtk||G.table.length===0||!G.table.every(t=>t.defense);
  document.getElementById('btnTake').disabled=done||!amDef||G.table.length===0;
  document.getElementById('btnPass').disabled=done||amDef||G.table.length===0;

  // Log
  const gl=document.getElementById('glog');
  gl.innerHTML=G.log.slice(0,5).map(l=>'<div>'+l+'</div>').join('');

  if(G.phase==='done') showOverlay();
}

function mkCard(card,play,unplay){
  const el=document.createElement('div');
  el.className='card '+(RED.has(card.suit)?'red':'blk');
  if(play) el.classList.add('play');
  if(unplay) el.classList.add('unplay');
  el.innerHTML=`<div class="cr" style="align-self:flex-start">${card.rank}</div><div class="cs">${card.suit}</div><div class="cr" style="align-self:flex-end;transform:rotate(180deg)">${card.rank}</div>`;
  return el;
}

function isMyTurn(){
  if(!G||G.phase==='done') return false;
  if(myIndex===G.defenderIdx&&G.phase==='defense'&&G.table.some(t=>!t.defense)) return true;
  if(myIndex!==G.defenderIdx&&G.phase==='attack') return true;
  return false;
}
function isOppTurn(idx){
  if(!G||G.phase==='done') return false;
  if(idx===G.defenderIdx&&G.phase==='defense') return true;
  if(idx===G.attackerIdx&&G.phase==='attack') return true;
  return false;
}

function onCardClick(card,play,amDef){
  if(!play||G.phase==='done') return;
  if(amDef&&G.phase==='defense'){
    const targets=G.table.filter(t=>!t.defense&&validDef(t.attack,card));
    if(targets.length===0) return;
    doAction({type:'DEFEND',attack:targets[0].attack,card});
  } else if(canAttack(myIndex)){
    doAction({type:'ATTACK',card});
  }
}

// ══════════ OVERLAY ══════════
function showOverlay(){
  if(!G||G.phase!=='done') return;
  const durak=players.find(p=>p.id===G.durakId);
  document.getElementById('overlay').style.display='flex';
  if(!durak){document.getElementById('oTitle').innerHTML='<span class="gold">Ничья!</span>';document.getElementById('oSub').textContent='Все вышли без карт';}
  else if(durak.id===myId){document.getElementById('oTitle').innerHTML='<span class="red-t">Ты — Дурак!</span>';document.getElementById('oSub').textContent='😅 Ничего, в следующий раз!';}
  else{document.getElementById('oTitle').innerHTML='<span class="green-t">Победа!</span>';document.getElementById('oSub').textContent=durak.name+' — ДУРАК!';}
}
function restartGame(){
  document.getElementById('overlay').style.display='none';
  if(isHost) hostStart();
  else broadcast({type:'RESTART'});
}
function goLobby(){
  document.getElementById('overlay').style.display='none';
  document.getElementById('game').style.display='none';
  document.getElementById('lobby').style.display='flex';
  G=null;
}
</script>
</body>
